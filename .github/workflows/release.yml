name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Validate the release without creating tags, GitHub releases, or package uploads."
        required: true
        default: true
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate_release:
    name: Validate release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create Python virtual environment
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add clippy rustfmt --toolchain stable
          rustup default stable
          rustup show

      - name: Install Python release tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade maturin twine pytest numpy

      - name: Check crates.io secret
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error title=Missing secret::CARGO_REGISTRY_TOKEN is not configured."
            exit 1
          fi

          python - <<'PY'
          import os

          cargo_token = os.environ["CARGO_REGISTRY_TOKEN"]
          if len(cargo_token.strip()) < 20:
              raise SystemExit("CARGO_REGISTRY_TOKEN looks too short to be a usable crates.io token.")
          PY

          echo "CARGO_REGISTRY_TOKEN is configured."
          echo "Skipping crates.io owner lookup because vvcm-rs may not exist before the first release."

      - name: Read release version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import pathlib
          import tomllib

          cargo = tomllib.loads(pathlib.Path("Cargo.toml").read_text(encoding="utf-8"))
          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          vcpkg = json.loads(
              pathlib.Path("vcpkg/ports/vvcm-rs/vcpkg.json").read_text(encoding="utf-8")
          )
          prebuilt_vcpkg = json.loads(
              pathlib.Path("vcpkg/prebuilt-ports/vvcm-rs/vcpkg.json").read_text(encoding="utf-8")
          )

          version = cargo["package"]["version"]
          versions = {
              "Cargo.toml": version,
              "pyproject.toml": pyproject["project"]["version"],
              "vcpkg/ports/vvcm-rs/vcpkg.json": vcpkg["version-semver"],
              "vcpkg/prebuilt-ports/vvcm-rs/vcpkg.json": prebuilt_vcpkg["version-semver"],
          }
          mismatches = [
              f"{path}={value}"
              for path, value in versions.items()
              if value != version
          ]
          if mismatches:
              raise SystemExit("package versions do not match: " + ", ".join(mismatches))

          print(f"version={version}")
          print(f"tag=v{version}")
          PY

      - name: Verify tag is unused
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin"
            exit 1
          fi

      - name: Run Rust checks
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
          cargo publish --dry-run --locked

      - name: Run Python binding tests
        run: |
          maturin develop --locked
          python -m pytest tests/python

      - name: Test vcpkg overlay port
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/microsoft/vcpkg "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          "$RUNNER_TEMP/vcpkg/vcpkg" install vvcm-rs \
            --overlay-ports="$GITHUB_WORKSPACE/vcpkg/ports" \
            --triplet x64-linux

      - name: Build Python sdist
        run: |
          mkdir -p python-dist release-dist
          maturin sdist --locked --out python-dist
          python -m twine check python-dist/*
          cp python-dist/* release-dist/

      - name: Package vcpkg overlay source archive
        run: |
          version="${{ steps.version.outputs.version }}"
          git archive --format=zip --prefix="vvcm-rs-${version}/" \
            -o "release-dist/vvcm-rs-${version}-vcpkg-overlay.zip" HEAD

      - name: Build release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(r"^## Unreleased\s*(.*?)(?=^## |\Z)", changelog, re.M | re.S)
          notes = match.group(1).strip() if match else ""
          if not notes:
              notes = "See CHANGELOG.md for release details."

          pathlib.Path("release-notes.md").write_text(
              f"## vvcm-rs {os.environ['VERSION']}\n\n{notes}\n",
              encoding="utf-8",
          )
          PY

      - name: Preview release notes
        run: |
          cat release-notes.md
          {
            echo "## Release notes preview"
            echo
            cat release-notes.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Python sdist
        uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: python-dist/*
          if-no-files-found: error

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: release-dist/*
          if-no-files-found: error

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build_native_artifacts:
    name: Build native vcpkg artifacts
    needs: validate_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - triplet: x64-windows
            os: windows-latest
          - triplet: x64-linux
            os: ubuntu-latest
          - triplet: x64-osx
            os: macos-13
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup show

      - name: Build native library
        run: |
          cargo build --lib --locked
          cargo build --lib --locked --release

      - name: Package native artifact
        run: |
          python scripts/package_vcpkg_native.py \
            --version "${{ needs.validate_release.outputs.version }}" \
            --triplet "${{ matrix.triplet }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-dist-${{ matrix.triplet }}
          path: native-dist/*.zip
          if-no-files-found: error

  build_python_wheels:
    name: Build Python wheels
    needs: validate_release
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create Python virtual environment
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup show

      - name: Install Python release tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade maturin twine pytest numpy

      - name: Run Python binding tests
        run: |
          maturin develop --locked
          python -m pytest tests/python

      - name: Build Python wheel
        run: |
          mkdir -p python-dist
          maturin build --release --locked --out python-dist
          python -m twine check python-dist/*

      - name: Upload Python wheel
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel-${{ matrix.python-version }}
          path: python-dist/*
          if-no-files-found: error

  package_prebuilt_vcpkg:
    name: Package prebuilt vcpkg overlay
    needs:
      - validate_release
      - build_native_artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-dist-*
          path: native-dist
          merge-multiple: true

      - name: Build prebuilt overlay archive
        run: |
          python scripts/package_vcpkg_prebuilt_port.py \
            --version "${{ needs.validate_release.outputs.version }}"

      - name: Validate prebuilt vcpkg overlay install
        run: |
          set -euo pipefail

          version="${{ needs.validate_release.outputs.version }}"
          overlay_zip="prebuilt-vcpkg-dist/vvcm-rs-${version}-vcpkg-prebuilt-overlay.zip"
          validation_root="$RUNNER_TEMP/vvcm-rs-prebuilt-validation"
          overlay_root="$validation_root/vvcm-rs-${version}-vcpkg-prebuilt-overlay"
          portfile="$overlay_root/ports/vvcm-rs/portfile.cmake"
          native_port=8765

          unzip -q "$overlay_zip" -d "$validation_root"

          python -m http.server "$native_port" \
            --bind 127.0.0.1 \
            --directory native-dist \
            > "$RUNNER_TEMP/vvcm-rs-native-http.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" >/dev/null 2>&1 || true' EXIT

          ready=0
          for attempt in 1 2 3 4 5; do
            if curl --silent --show-error --fail \
              "http://127.0.0.1:${native_port}/vvcm-rs-${version}-x64-linux.zip" \
              --output /dev/null; then
              ready=1
              break
            fi
            sleep 1
          done

          if [ "$ready" -ne 1 ]; then
            echo "::error title=Local artifact server unavailable::Could not serve the native artifacts needed to validate the prebuilt vcpkg overlay."
            exit 1
          fi

          PORTFILE="$portfile" VERSION="$version" PORT="$native_port" python - <<'PY'
          import os
          import pathlib

          portfile = pathlib.Path(os.environ["PORTFILE"])
          version = os.environ["VERSION"]
          port = os.environ["PORT"]
          expected = f"https://github.com/morningfrog/vvcm-rs/releases/download/v{version}/"
          replacement = f"http://127.0.0.1:{port}/"
          text = portfile.read_text(encoding="utf-8")
          if expected not in text:
              raise SystemExit(f"expected release URL prefix not found in {portfile}")
          portfile.write_text(text.replace(expected, replacement, 1), encoding="utf-8")
          PY

          git clone --depth 1 https://github.com/microsoft/vcpkg "$RUNNER_TEMP/vcpkg-prebuilt"
          "$RUNNER_TEMP/vcpkg-prebuilt/bootstrap-vcpkg.sh" -disableMetrics
          "$RUNNER_TEMP/vcpkg-prebuilt/vcpkg" install vvcm-rs \
            --overlay-ports="$overlay_root/ports" \
            --triplet x64-linux

      - name: Upload prebuilt vcpkg overlay
        uses: actions/upload-artifact@v7
        with:
          name: prebuilt-vcpkg-dist
          path: prebuilt-vcpkg-dist/*.zip
          if-no-files-found: error

  validate_pypi_trusted_publisher:
    name: Validate PyPI Trusted Publisher
    if: ${{ inputs['dry-run'] }}
    needs:
      - validate_release
      - build_native_artifacts
      - build_python_wheels
      - package_prebuilt_vcpkg
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Mint PyPI token without uploading
        run: |
          set -euo pipefail

          oidc_response="$(
            curl --silent --show-error \
              --header "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=pypi"
          )"
          oidc_token="$(jq -r '.value // empty' <<< "$oidc_response")"

          if [ -z "$oidc_token" ]; then
            echo "$oidc_response"
            echo "::error title=OIDC token unavailable::GitHub did not return an OIDC token for PyPI."
            exit 1
          fi

          OIDC_TOKEN="$oidc_token" python - <<'PY' > pypi-oidc-request.json
          import json
          import os

          print(json.dumps({"token": os.environ["OIDC_TOKEN"]}))
          PY

          pypi_status="$(
            curl --silent --show-error --output pypi-oidc-response.json --write-out "%{http_code}" \
              --request POST "https://pypi.org/_/oidc/mint-token" \
              --header "Content-Type: application/json" \
              --data @pypi-oidc-request.json
          )"

          if [ "$pypi_status" != "200" ]; then
            cat pypi-oidc-response.json
            echo "::error title=PyPI Trusted Publisher rejected::Expected HTTP 200 from PyPI OIDC token minting, got ${pypi_status}."
            exit 1
          fi

          api_token="$(jq -r '.token // empty' pypi-oidc-response.json)"
          if [ -z "$api_token" ]; then
            cat pypi-oidc-response.json
            echo "::error title=PyPI token missing::PyPI did not return a short-lived token."
            exit 1
          fi

          echo "::add-mask::$api_token"
          echo "PyPI Trusted Publishing accepted this workflow identity. No upload was performed."
          echo "## PyPI Trusted Publishing validated" >> "$GITHUB_STEP_SUMMARY"
          echo "PyPI minted a short-lived token for this workflow identity. No upload was performed." >> "$GITHUB_STEP_SUMMARY"

      - name: Finish dry run
        run: |
          echo "Dry run completed. No git tag, GitHub release, crates.io publish, or PyPI upload was created."
          echo "## Dry run completed" >> "$GITHUB_STEP_SUMMARY"
          echo "No git tag, GitHub release, crates.io publish, or PyPI upload was created." >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish release
    if: ${{ !inputs['dry-run'] }}
    needs:
      - validate_release
      - build_native_artifacts
      - build_python_wheels
      - package_prebuilt_vcpkg
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    env:
      CARGO_TERM_COLOR: always
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup show

      - name: Download Python sdist
        uses: actions/download-artifact@v8
        with:
          name: python-sdist
          path: python-dist

      - name: Download Python wheels
        uses: actions/download-artifact@v8
        with:
          pattern: python-wheel-*
          path: python-dist
          merge-multiple: true

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: release-dist

      - name: Download Python wheels for release assets
        uses: actions/download-artifact@v8
        with:
          pattern: python-wheel-*
          path: release-dist
          merge-multiple: true

      - name: Download native assets
        uses: actions/download-artifact@v8
        with:
          pattern: native-dist-*
          path: release-dist
          merge-multiple: true

      - name: Download prebuilt vcpkg overlay
        uses: actions/download-artifact@v8
        with:
          name: prebuilt-vcpkg-dist
          path: release-dist

      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: release-notes

      - name: Create git tag
        run: |
          tag="${{ needs.validate_release.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.validate_release.outputs.tag }}" release-dist/* \
            --verify-tag \
            --title "vvcm-rs ${{ needs.validate_release.outputs.version }}" \
            --notes-file release-notes/release-notes.md

      - name: Publish crate to crates.io
        run: cargo publish --locked

      - name: Publish Python distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-dist
